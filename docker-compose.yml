version: "3.7"

services:
  caddy:
    container_name: caddy
    build:
      context: ${DOCKERDIR}
      dockerfile: caddy.dockerfile #Custom build which uses duckdns

    depends_on:
      - jellyfin
      - uptime-kuma
      - tandoor_webserver

    external_links:
      - crowdsec:crowdsec
      - jellyfin:jellyfin
      - uptime-kuma:uptime-kuma
      - tandoor_webserver:tandoor_webserver

    networks:
        - web
        - caddy-net
        - htpc-net

    ports:
        - ${PORT_CADDY_HTTP}:80
        - ${PORT_CADDY_HTTPS}:443

    environment:
      LOG_FILE: ${LOGDIR}/caddy/access.log
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL_ADMIN}
      DUCKDNS_API_TOKEN: ${DUCKDNS_TOKEN}
      
      BOUNCER_CADDY_TOKEN: ${BOUNCER_CADDY_TOKEN}
      PORT_CROWDSEC_API: ${PORT_CROWDSEC_API}

      PORT_RECIPE: ${PORT_RECIPE}
      PORT_HTPC_HTTP: ${PORT_HTPC_HTTP}
      PORT_UPKUMA: ${PORT_UPKUMA}

    volumes:
      - ${STATICONFIGDIR}/caddy/Caddyfile:/etc/caddy/Caddyfile # Required. Needs to be an extension-less file NOT a directory
      - ${CONFIGDIR}:/data # Optional, house for certs. Caddy adds its own /caddy/ directory
      - ${CONFIGDIR}:/config # Optional, JSON Config files. Caddy adds its own /caddy/ directory
      - ${LOGDIR}/caddy:/server/logs/caddy ## check for /access.log

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 64M
    healthcheck:
      test: ["CMD", "caddy", "version"]
    restart: unless-stopped
  
  crowdsec:
    container_name: crowdsec
    image: crowdsecurity/crowdsec:v1.3.0

    depends_on:
      - caddy
      - socky_proxy
    
    networks:
      - caddy-net # provides access for the reverse proxy
      - socky_proxy-net

    ports:
      - ${PORT_CROWDSEC_API}:8080 # exposes a REST API for bouncers, cscli and communication between crowdsec agent and local api
      - ${PORT_CROWDSEC_METRICS}:6060 #exposes prometheus metrics on /metrics and pprof debugging metrics on /debug

    environment:
      TZ: ${TZ}
      GID: ${PGID}
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/caddy crowdsecurity/linux-lpe"
      DOCKER_HOST: tcp://socky_proxy:${PORT_SOCKY_PROXY} # redirects socket to the proxy. Needed for the config.yaml direction to scan other docker containers

    volumes:
      - ${STATICONFIGDIR}/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml
      - crowdsec-config:/etc/crowdsec/
      - crowdsec-db:/var/lib/crowdsec/data/
    #  - ${CONFIGDIR}/crowdsec:/etc/crowdsec/ # This is my preferred way to get things working, but currently doesn't work

      ## Log Files
      - ${LOGDIR}/caddy:/var/log/caddy:ro ## check https://hub.crowdsec.net/author/crowdsecurity/configurations/caddy-logs
      - /var/log/auth.log:/logs/auth.log:ro
      - /var/log/syslog.log:/logs/syslog.log:ro
      
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
    restart: always
  
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin

    user: ${PUID}:${PGID}

    networks:
      - htpc-net
      - caddy-net # provides access for the reverse proxy
    
    ports:
      - ${PORT_HTPC_HTTP}:8096 #HTTP webUI
      - ${PORT_HTPC_HTTPS}:8920 #HTTPS webUI
      - ${PORT_HTPC_LOCAL}:7359/udp #optional. Allows clients to discover Jellyfin on the local network.
      - ${PORT_HTPC_DLNA}:1900/udp #optional. Service discovery used by DNLA and clients.

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      JELLYFIN_PublishedServerUrl: ${JELLYFIN_URL} #optional. The Server URL to publish in udp Auto Discovery response.

    volumes:
      - ${CONFIGDIR}/jellyfin:/config
      - ${CACHEDIR}/jellyfin:/cache
      - ${MEDIADIR}:/media:ro
    
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '2'
    #      memory: 1024M
    restart: unless-stopped

  heimdall:
    container_name: heimdall
    image: ghcr.io/linuxserver/heimdall
    
    ports:
      - ${PORT_DASH_HTTP}:80
      - ${PORT_DASH_HTTPS}:443

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${CONFIGDIR}/heimdall:/config
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
    restart: unless-stopped

  tandoor:
    container_name: tandoor
    image: vabene1111/recipes:1.0.8

    depends_on:
      - tandoor_db

    networks:
      - tandoor-net # provides access to the back-end

    env_file:
      - ./env/tandoor.env

    environment:
      TIMEZONE: ${TZ}
      POSTGRES_PORT: ${PORT_POSTGRES}

    volumes:
      - tandoor-static:/opt/recipes/staticfiles # app files
      - tandoor-media:/opt/recipes/mediafiles # recipe images
      - ${CONFIGDIR}/tandoor/conf.d:/etc/nginx/conf.d #enables webserver #move to static config after test
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    restart: unless-stopped
  
  tandoor_webserver:
    container_name: tandoor_webserver
    image: nginx:mainline-alpine

    depends_on:
      - tandoor

    networks:
      - caddy-net # provides access for the reverse proxy
      - tandoor-net # provides access to the app

    ports:
      - ${PORT_RECIPE}:80

    env_file:
      - ./env/tandoor.env
    
    volumes:
      - ${CONFIGDIR}/tandoor/conf.d:/etc/nginx/conf.d:ro
      - tandoor-static:/static
      - tandoor-media:/media

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
    restart: unless-stopped

  uptime-kuma:
    container_name: uptime_kuma
    image: louislam/uptime-kuma
    
    networks:
      - caddy-net # provides access for the reverse proxy
    
    ports:
      - ${PORT_UPKUMA}:3001
    
    volumes:
      - ${CONFIGDIR}/uptime-kuma:/app/data
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
    restart: always

####################
# Back End Services
####################

  adminer:
    container_name: adminer
    image: adminer
    
    depends_on:
      - tandoor_db
    
    networks:
      - tandoor-net

    ports:
      - ${PORT_ADMINER}:8080

    environment:
      ADMINER_DESIGN: 'dracula' #TODO env

    links:
      - tandoor_db:db
  
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 32M
    restart: unless-stopped

  duckdns:
    container_name: duckdns
    image: ghcr.io/linuxserver/duckdns

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      SUBDOMAINS: ${DUCKDNS_SUBDOMAINLIST}
      TOKEN: ${DUCKDNS_TOKEN}
      LOG_FILE: ${LOGDIR}/duckdns.log #optional

    volumes:
      - ${CONFIGDIR}/duckdns:/config #optional

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 32M  
    restart: unless-stopped

  socky_proxy:
    container_name: socky_proxy
    image: ghcr.io/tecnativa/docker-socket-proxy:0.1 # A security-enhanced proxy for the Docker Socket.

    privileged: true
  
    networks:
      - socky_proxy-net

    ports:
      - ${PORT_SOCKY_PROXY}:2375

    environment:
      # Variables match the URL prefix (i.e. AUTH blocks access to /auth/* parts of the API, etc).
      #   0 - revoke access
      #   1 - grant access
      CONTAINERS: 1 # crowdsec
      INFO: 1 # crowdsec

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 32M

  tandoor_db:
    container_name: tandoor_db
    image: postgres:11-alpine

    networks:
      - tandoor-net

    ports:
      - ${PORT_POSTGRES}:5432

    env_file:
      - ./env/tandoor.env

    volumes:
      - ${DBDIR}/tandoor:/var/lib/postgresql/data

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 96M
    restart: always


####################
# Docker Environment
####################

volumes:
  crowdsec-config:
  crowdsec-db:
  tandoor-static:
  tandoor-media:
  tandoor-webserv:

networks:
  web:
    name: web
    external: true
  htpc-net:
    name: htpc-net
  caddy-net:
    name: caddy-net
  socky_proxy-net:
    name: socky_proxy-net
  tandoor-net:
    name: tandoor-net
